- aid: autodesk-construction-cloud:acc-admin-api
  name: Autodesk Construction Cloud Admin API
  tags:
  - Construction
  - BIM
  - Project Management
  - Administration
  - ACC
  image: https://raw.githubusercontent.com/api-evangelist/autodesk-construction-cloud/refs/heads/main/image.png
  humanURL: https://aps.autodesk.com/en/docs/acc/v1/overview/
  baseURL: https://developer.api.autodesk.com
  properties:
  - url: https://aps.autodesk.com/en/docs/acc/v1/overview/
    type: Documentation
  - url: https://aps.autodesk.com/en/docs/acc/v1/reference/http/admin-accounts-accountidprojects-GET/
    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The Autodesk Construction Cloud Admin API provides programmatic management of ACC accounts, projects, users, and company settings. REST APIs enable automation of project provisioning, user access control, and account-level administration across ACC and BIM 360 deployments.

- aid: autodesk-construction-cloud:acc-issues-api
  name: Autodesk Construction Cloud Issues API
  tags:
  - Construction
  - BIM
  - Issues
  - Quality
  - Field Management
  image: https://raw.githubusercontent.com/api-evangelist/autodesk-construction-cloud/refs/heads/main/image.png
  humanURL: https://aps.autodesk.com/en/docs/acc/v1/overview/
  baseURL: https://developer.api.autodesk.com
  properties:
  - url: https://aps.autodesk.com/en/docs/acc/v1/reference/http/issues-issues-POST/
    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The ACC Issues API enables creation, retrieval, and management of construction issues, observations, and punch list items. REST APIs integrate with field management workflows for quality control, safety reporting, and project closeout in Autodesk Construction Cloud.

- aid: autodesk-construction-cloud:acc-cost-management-api
