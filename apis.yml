    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The ACC Model Coordination API enables access to model sets, clash detection results, and coordination issues in Autodesk Construction Cloud. REST APIs support automated BIM coordination workflows, clash review automation, and model aggregation across design disciplines.

- aid: autodesk-construction-cloud:acc-rfis-api
  name: Autodesk Construction Cloud RFIs API
  tags:
  - Construction
  - RFI
  - Document Management
  - ACC
  image: https://raw.githubusercontent.com/api-evangelist/autodesk-construction-cloud/refs/heads/main/image.png
  humanURL: https://aps.autodesk.com/en/docs/acc/v1/overview/
  baseURL: https://developer.api.autodesk.com
  properties:
  - url: https://aps.autodesk.com/en/docs/acc/v1/reference/http/rfis-rfi-search-POST/
    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The ACC RFIs API enables management of Requests for Information (RFIs) in Autodesk Construction Cloud. REST APIs support RFI creation, tracking, response workflows, and reporting for construction project documentation and decision management.

- aid: autodesk-construction-cloud:acc-submittals-api
  name: Autodesk Construction Cloud Submittals API
  tags:
  - Construction
  - Submittals
  - Document Management
  - ACC
  image: https://raw.githubusercontent.com/api-evangelist/autodesk-construction-cloud/refs/heads/main/image.png
  humanURL: https://aps.autodesk.com/en/docs/acc/v1/overview/
  baseURL: https://developer.api.autodesk.com
  properties:
  - url: https://aps.autodesk.com/en/docs/acc/v1/reference/http/submittals-items-GET/
    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The ACC Submittals API provides programmatic access to submittal workflows in Autodesk Construction Cloud. REST APIs support submittal item creation, review routing, approval tracking, and specification section management for construction project compliance.

- aid: autodesk-construction-cloud:acc-data-connector-api
  name: Autodesk Construction Cloud Data Connector API
  tags:
  - Construction
  - Data Export
  - Analytics
  - ACC
  image: https://raw.githubusercontent.com/api-evangelist/autodesk-construction-cloud/refs/heads/main/image.png
  humanURL: https://aps.autodesk.com/en/docs/acc/v1/overview/
  baseURL: https://developer.api.autodesk.com
  properties:
  - url: https://aps.autodesk.com/en/docs/acc/v1/reference/http/data-connector-requests-POST/
    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The ACC Data Connector API enables bulk extraction of project data from Autodesk Construction Cloud for analytics and reporting. REST APIs support scheduled and on-demand data exports across issues, RFIs, submittals, assets, and other project modules for business intelligence integration.

