  - type: Features
    data:
      - name: Project Administration
        description: >-
          Programmatic management of ACC accounts, projects, users, and company settings with automation of project
          provisioning and user access control.
      - name: Issues and Field Management
        description: >-
          Creation, tracking, and management of construction issues, observations, punch lists, and quality control
          items through REST APIs.
      - name: Cost Management
        description: >-
          Budget tracking, contract lifecycle management, change order processing, and financial reporting for
          construction project portfolios.
      - name: Model Coordination
        description: >-
          Automated BIM coordination with clash detection, model set management, and coordination issue tracking across
          design disciplines.
      - name: RFI and Submittal Management
        description: >-
          End-to-end management of Requests for Information and submittal review workflows with approval tracking and
          compliance reporting.
      - name: Data Connector
        description: >-
          Bulk extraction of project data for analytics and business intelligence, supporting scheduled and on-demand
          exports across all ACC modules.
      - name: Webhooks
        description: >-
          Event-driven notifications via webhooks for real-time integration with external systems when project data
          changes in ACC.
  - type: UseCases
    data:
      - name: ERP Integration
        description: >-
          Connecting ACC cost management and project data with enterprise ERP systems for unified financial reporting
          and project accounting.
      - name: BIM Workflow Automation
        description: >-
          Automating BIM coordination workflows including clash detection review, model set updates, and coordination
          issue resolution across teams.
      - name: Construction Project Reporting
        description: >-
          Building custom dashboards and reports using the Data Connector API to aggregate project data across issues,
          RFIs, submittals, and costs.
      - name: Field Management Integration
        description: >-
          Integrating ACC issues and punch list management with mobile field apps, IoT sensors, and safety management
          platforms.
      - name: Document Control Automation
        description: >-
          Automating RFI and submittal routing, review reminders, and approval tracking to reduce administrative burden
          on project document control teams.
  - type: Integrations
    data:
      - name: Autodesk Platform Services
        description: >-
          Full integration with the Autodesk Platform Services (APS) ecosystem including Data Management, Model
          Derivative, and Authentication APIs.
      - name: Procore
        description: >-
          Integration possibilities with Procore construction management platform for cross-platform project data
          synchronization.
      - name: Primavera P6
        description: >-
          Schedule data integration with Oracle Primavera P6 for project schedule management and reporting across
          enterprise construction portfolios.
      - name: SAP
        description: >-
          Enterprise ERP integration with SAP for financial data synchronization, purchase order management, and project
          accounting workflows.
