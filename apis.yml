aid: autodesk-construction-cloud
name: Autodesk Construction Cloud
description: >-
  Autodesk Construction Cloud (ACC) is a unified platform connecting workflows, teams, and data across the construction
  project lifecycle, integrating preconstruction, design collaboration, project management, and field execution tools.
  ACC provides REST APIs through the Autodesk Platform Services (APS) for programmatic access to project management,
  issues, RFIs, submittals, cost management, model coordination, and data export capabilities.
