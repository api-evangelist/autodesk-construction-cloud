    type: Reference
  - url: https://aps.autodesk.com/en/docs/acc/v1/tutorials/getting-started
    type: GettingStarted
  description: >-
    The ACC Cost Management API provides access to budget codes, contract lifecycle management, and expense tracking in Autodesk Construction Cloud. REST APIs enable ERP integration, change order management, and financial reporting across construction project portfolios.

- aid: autodesk-construction-cloud:acc-model-coordination-api
  name: Autodesk Construction Cloud Model Coordination API
  tags:
  - Construction
  - BIM
  - Model Coordination
  - Clash Detection
  - IFC
  image: https://raw.githubusercontent.com/api-evangelist/autodesk-construction-cloud/refs/heads/main/image.png
