specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Autodesk Construction Cloud
providerId: autodesk-construction-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - BIM
  - Project Management
  - AEC
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Autodesk Construction Cloud — per-user / per-project subscription
  bundles (Model Management, Preconstruction, Construction Operations) plus standalone products
  (Build, Docs, BIM Collaborate Pro, Takeoff, Cost Management). API access is bundled with the
  underlying ACC product entitlement; no separate per-API metering. Storage in Autodesk Docs counts
  toward project entitlements.
sources:
  - https://construction.autodesk.com/pricing/
  - https://aps.autodesk.com/en/docs/acc/v1/overview/
  - https://focus.finops.org/focus-specification/v1-3/
notes: ACC pricing is quote-based; per-seat list rates not publicly published. Meters below describe
  the entitlement axes for showback rather than direct invoice lines.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Autodesk, Inc.
serviceCategory: Construction Software / Project Management
billingModel:
  pricingCategory: Subscription (Per-User / Per-Project)
  billingFrequency: Annual
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Autodesk Construction Cloud
  ServiceCategory: Construction Software
  ServiceSubcategory: Project Management & Field Execution
  ProviderName: Autodesk
  PublisherName: Autodesk, Inc.
  InvoiceIssuerName: Autodesk, Inc.
  BillingCurrency: USD
  PricingCategory: Subscription
meters:
  - name: acc_user_seats
    description: Per-user ACC product subscriptions (Build, Docs, BIM Collaborate Pro, etc.)
    unit: seat-month
    aggregation: max
    dimensions:
      - product
      - bundle
      - hub
  - name: acc_project_count
    description: Active ACC projects under the account
    unit: project
    aggregation: max
    dimensions:
      - hub
      - project_type
  - name: acc_storage
    description: Project storage consumed in Autodesk Docs / BIM 360 Docs
    unit: GB-month
    aggregation: max
    dimensions:
      - hub
      - project
  - name: acc_api_calls
    description: ACC API call activity — included with product entitlement, not separately billed
    unit: request
    aggregation: sum
    dimensions:
      - api
      - app
      - project
  - name: data_connector_exports
    description: ACC Data Connector bulk-export jobs run
    unit: job
    aggregation: sum
    dimensions:
      - module
      - project
principles:
  - name: Visibility
    description: Use the Autodesk Account portal and ACC Admin reports to surface seat utilization,
      active project count, and storage per hub. Pair with the ACC Data Connector to export usage
      data for showback.
  - name: Allocation
    description: Allocate ACC seats and project counts by ACC hub, project owner, and division using
      the ACC company directory and project metadata; tag APS apps by integration owner.
  - name: Optimization
    description: Reclaim inactive ACC seats at renewal; consolidate dormant projects; archive completed
      projects from active storage. For data-heavy integrations, schedule Data Connector exports off-peak
      to avoid contention with interactive users.
  - name: Accountability
    description: Construction IT or VDC/BIM-platform team owns ACC entitlement; review seat utilization
      quarterly. Project executives own per-project storage and active-project counts.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
