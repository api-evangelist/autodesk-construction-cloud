naftiko: 1.0.0-alpha2
info:
  label: Autodesk Construction Cloud Admin API
  description: The Autodesk Construction Cloud (ACC) Admin API provides programmatic management of ACC accounts, projects,
    users, and company settings. REST APIs enable automation of project provisioning, user access control, and account-level
    administration across ACC and BIM 360 deployments.
  tags:
  - Autodesk
  - Construction
  - Cloud
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: autodesk-construction-cloud
    baseUri: https://developer.api.autodesk.com
    description: Autodesk Construction Cloud Admin API HTTP API.
    authentication:
      type: bearer
      token: '{{AUTODESK_CONSTRUCTION_CLOUD_TOKEN}}'
    resources:
    - name: construction-admin-v1-accounts-accountid-project
      path: /construction/admin/v1/accounts/{accountId}/projects
      operations:
      - name: getaccountprojects
        method: GET
        description: Get account projects
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: The unique identifier of the ACC account
        - name: filter[status]
          in: query
          type: string
          description: Filter by project status
        - name: filter[name]
          in: query
          type: string
          description: Filter projects by name (partial match)
        - name: include
          in: query
          type: string
          description: Include related resources
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproject
        method: POST
        description: Create a new project
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: construction-admin-v1-accounts-accountid-project
      path: /construction/admin/v1/accounts/{accountId}/projects/{projectId}
      operations:
      - name: getproject
        method: GET
        description: Get project by ID
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateproject
        method: PATCH
        description: Update project
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: construction-admin-v1-accounts-accountid-project
      path: /construction/admin/v1/accounts/{accountId}/projects/{projectId}/users
      operations:
      - name: getprojectusers
        method: GET
        description: Get project users
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addprojectuser
        method: POST
        description: Add user to project
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: projectId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: construction-admin-v1-accounts-accountid-users
      path: /construction/admin/v1/accounts/{accountId}/users
      operations:
      - name: getaccountusers
        method: GET
        description: Get account users
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: filter[status]
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: construction-admin-v1-accounts-accountid-compani
      path: /construction/admin/v1/accounts/{accountId}/companies
      operations:
      - name: getaccountcompanies
        method: GET
        description: Get account companies
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: autodesk-construction-cloud-rest
    description: REST adapter for Autodesk Construction Cloud Admin API.
    resources:
    - path: /construction/admin/v1/accounts/{accountId}/projects
      name: getaccountprojects
      operations:
      - method: GET
        name: getaccountprojects
        description: Get account projects
        call: autodesk-construction-cloud.getaccountprojects
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/projects
      name: createproject
      operations:
      - method: POST
        name: createproject
        description: Create a new project
        call: autodesk-construction-cloud.createproject
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/projects/{projectId}
      name: getproject
      operations:
      - method: GET
        name: getproject
        description: Get project by ID
        call: autodesk-construction-cloud.getproject
        with:
          accountId: rest.accountId
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/projects/{projectId}
      name: updateproject
      operations:
      - method: PATCH
        name: updateproject
        description: Update project
        call: autodesk-construction-cloud.updateproject
        with:
          accountId: rest.accountId
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/projects/{projectId}/users
      name: getprojectusers
      operations:
      - method: GET
        name: getprojectusers
        description: Get project users
        call: autodesk-construction-cloud.getprojectusers
        with:
          accountId: rest.accountId
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/projects/{projectId}/users
      name: addprojectuser
      operations:
      - method: POST
        name: addprojectuser
        description: Add user to project
        call: autodesk-construction-cloud.addprojectuser
        with:
          accountId: rest.accountId
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/users
      name: getaccountusers
      operations:
      - method: GET
        name: getaccountusers
        description: Get account users
        call: autodesk-construction-cloud.getaccountusers
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /construction/admin/v1/accounts/{accountId}/companies
      name: getaccountcompanies
      operations:
      - method: GET
        name: getaccountcompanies
        description: Get account companies
        call: autodesk-construction-cloud.getaccountcompanies
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
