specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Autodesk Construction Cloud
providerId: autodesk-construction-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - BIM
  - Project Management
  - AEC
  - Field Management
description: Autodesk Construction Cloud (ACC) is sold as a suite of per-user / per-project subscriptions
  packaged into bundles — Model Management Bundle, Preconstruction Bundle, Construction Operations
  Bundle — plus standalone products like Build, Docs, BIM Collaborate Pro, Takeoff, Cost Management,
  Assemble, BuildingConnected, ProEst, and Pype. Public per-product pricing is gated on the Autodesk
  Construction Cloud pricing page; Autodesk publishes "flexible user, project, and account-based pricing"
  but does not list rates without a quote. ACC APIs (ACC Admin, Issues, RFIs, Submittals, Cost, Data
  Connector, Model Coordination) are accessed via Autodesk Platform Services and require an APS app
  associated with an entitled ACC project.
sources:
  - https://construction.autodesk.com/pricing/
  - https://aps.autodesk.com/en/docs/acc/v1/overview/
notes: ACC public pricing page does not display per-user rates; pricing is quote-based. APS APIs for
  ACC are not separately metered — access depends on the underlying ACC product entitlement.
plans:
  - id: autodesk-construction-cloud-bundles
    name: Autodesk Construction Cloud Bundles
    type: subscription
    description: Pre-packaged ACC bundles aligned to project lifecycle phases. Pricing is quote-based.
    entries:
      - label: Model Management Bundle
        name: model_management_bundle
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales (quote-based)
        userMultiplied: true
      - label: Preconstruction Bundle
        name: preconstruction_bundle
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales (quote-based)
        userMultiplied: true
      - label: Construction Operations Bundle
        name: construction_ops_bundle
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales (quote-based)
        userMultiplied: true
    elements:
      - name: Model Coordination
      - name: Design Collaboration
      - name: Forma Data Management
      - name: Insight
      - name: Assemble
      - name: Autodesk Tandem for AEC
      - name: Navisworks Manage
      - name: Recap Pro
      - name: ProEst
      - name: BuildingConnected Pro
      - name: Bid Board Pro
      - name: TradeTapp
      - name: Forma Takeoff
      - name: Forma Estimate
      - name: Forma Build
      - name: Pype AutoSpecs
      - name: Pype Closeout
  - id: autodesk-construction-cloud-standalone
    name: ACC Standalone Products
    type: subscription
    description: Standalone ACC products available outside the bundles, sold per-user with quote-based
      pricing.
    entries:
      - label: Per-user product subscription
        name: standalone_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales (quote-based)
        userMultiplied: true
    elements:
      - name: Autodesk Build
      - name: Autodesk Docs
      - name: BIM Collaborate Pro
      - name: Takeoff
      - name: Cost Management
      - name: BuildingConnected
  - id: autodesk-construction-cloud-apis
    name: ACC APIs (via APS)
    type: usage-based
    description: ACC APIs (Admin, Issues, RFIs, Submittals, Cost, Data Connector, Model Coordination,
      Sheets, Photos, Reviews, Assets, Forms) accessed through Autodesk Platform Services. Standard
      data APIs do not consume Cloud Credits; chargeable operations follow the APS Cloud Credits model.
    entries:
      - label: ACC API calls
        name: acc_api_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included with ACC product entitlement
        userMultiplied: false
    elements:
      - name: ACC Admin API
      - name: ACC Issues API
      - name: ACC RFIs API
      - name: ACC Submittals API
      - name: ACC Cost Management API
      - name: ACC Data Connector API
      - name: ACC Model Coordination API
      - name: ACC Photos API
      - name: ACC Sheets API
      - name: ACC Reviews API
