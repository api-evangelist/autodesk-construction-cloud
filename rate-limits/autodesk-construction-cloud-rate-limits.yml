specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Autodesk Construction Cloud
providerId: autodesk-construction-cloud
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - BIM
  - Project Management
  - AEC
  - Rate Limiting
description: Autodesk Construction Cloud (ACC) APIs are served via Autodesk Platform Services and
  inherit APS rate-limit semantics (per-app, per-token, 429 with Retry-After). ACC-specific APIs
  (Issues, RFIs, Submittals, Data Connector) document per-API limits in their respective reference
  pages rather than at a single canonical URL.
sources:
  - https://aps.autodesk.com/en/docs/acc/v1/overview/
  - https://aps.autodesk.com/developer/overview
notes: No single canonical rate-limit table exists for ACC; verify limits per API in the ACC reference
  docs. Data Connector exports are particularly throttled — large exports queue.
headers:
  retryAfter: Retry-After
  requestId: x-ads-trace-id
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: ACC API Throttling (per-app, per-token)
    scope: account/app
    metric: varies
    limit: per-API limits documented in each ACC API reference page
    notes: Treat as variable per API; instrument 429 handling at the integration level.
  - name: Data Connector export concurrency
    scope: account
    metric: concurrent_requests
    limit: see ACC Data Connector reference
    notes: Bulk export jobs are queued; large exports may take minutes to hours depending on project
      size.
  - name: Webhook delivery
    scope: account
    metric: varies
    limit: APS webhook delivery retries on transient failures with exponential backoff
    notes: Consumers must respond 2xx within the documented timeout to avoid retries / disablement.
policies:
  - name: Backoff Strategy
    description: Honor Retry-After when present; use exponential backoff with jitter on 429 / 503.
  - name: Per-App Token Scoping
    description: Rate limits are scoped to the calling app's client_id; multi-integration callers should
      split credentials.
  - name: Data Connector Queuing
    description: Treat Data Connector bulk-export requests as long-running async jobs — poll status
      rather than spinning on the request endpoint.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
